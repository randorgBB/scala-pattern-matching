plugins {
    // Apply the scala Plugin to add support for Scala.
    id 'scala'

    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'

    id 'java'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use Scala 2.12.18 in our library project
    implementation libs.scala.library

    implementation libs.spark.core
    implementation libs.spark.sql
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

def jvmOpenArgs = [
    "--add-opens=java.base/java.lang=ALL-UNNAMED",
    "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED",
    "--add-opens=java.base/java.io=ALL-UNNAMED",
    "--add-opens=java.base/java.net=ALL-UNNAMED",
    "--add-opens=java.base/java.nio=ALL-UNNAMED",
    "--add-opens=java.base/java.util=ALL-UNNAMED",
    "--add-opens=java.base/java.util.concurrent=ALL-UNNAMED",
    "--add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED",
    "--add-opens=java.base/sun.nio.ch=ALL-UNNAMED",
    "--add-opens=java.base/sun.nio.cs=ALL-UNNAMED",
    "--add-opens=java.base/sun.security.action=ALL-UNNAMED"
]

task runPrintStatement(type: JavaExec) {
    dependsOn compileScala // <--- ADD THIS
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.example.PrintStatement'
    jvmArgs = jvmOpenArgs
    errorOutput = System.err
    standardOutput = System.out
}

task runEx1(type: JavaExec) {
    dependsOn compileScala // <--- ADD THIS
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.example.scala_native_data_modelling.Ex1'
    jvmArgs = jvmOpenArgs
    errorOutput = System.err
    standardOutput = System.out
}

task runEx2(type: JavaExec) {
    dependsOn compileScala // <--- ADD THIS
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.example.scala_native_data_modelling.Ex2'
    jvmArgs = jvmOpenArgs
    errorOutput = System.err
    standardOutput = System.out
}

task runEx3(type: JavaExec) {
    dependsOn compileScala // <--- ADD THIS
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.example.scala_native_data_modelling.Ex3'
    jvmArgs = jvmOpenArgs
    errorOutput = System.err
    standardOutput = System.out
}

application {
    // Define the main class for the application.
    mainClass = 'org.example.App'

    // BLOCK TO SILENCE THE JVM WARNINGS:
    applicationDefaultJvmArgs = jvmOpenArgs

    if (project.hasProperty("main")) {
        mainClass = project.getProperty("main")
    }
}

